name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -e '.[dev,mcp]'
      - run: python -m pytest -q
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: node --test scripts/workplan.test.mjs
