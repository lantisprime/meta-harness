<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="980" height="760" fill="#ffffff"/>
  <text x="24" y="36" font-size="20" font-weight="700" fill="#0f172a">Meta-Harness — system overview</text>
  <text x="24" y="56" font-size="12" fill="#64748b">Control plane that orchestrates worker harnesses · deterministic spine, intelligent steps</text>

  <!-- Web UI band -->
  <rect x="24" y="76" width="640" height="86" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="40" y="100" font-size="13" font-weight="700" fill="#3730a3">Web UI</text>
  <g font-size="11" fill="#312e81">
    <rect x="40" y="112" width="112" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/><text x="96" y="133" text-anchor="middle">Run tree · steering</text>
    <rect x="160" y="112" width="112" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/><text x="216" y="133" text-anchor="middle">Worker registry</text>
    <rect x="280" y="112" width="112" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/><text x="336" y="133" text-anchor="middle">Eval dashboards</text>
    <rect x="400" y="112" width="112" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/><text x="456" y="133" text-anchor="middle">Approval queue</text>
    <rect x="520" y="112" width="124" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/><text x="582" y="133" text-anchor="middle">Playbook · budgets</text>
  </g>

  <!-- Control plane -->
  <rect x="24" y="192" width="640" height="102" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="40" y="216" font-size="13" font-weight="700" fill="#065f46">Control Plane — deterministic, journaled</text>
  <g font-size="11" fill="#064e3b">
    <rect x="40" y="228" width="190" height="52" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="135" y="248" text-anchor="middle" font-weight="600">Workflow Engine</text>
    <text x="135" y="264" text-anchor="middle" fill="#047857">journaled steps · HITL gates · resume</text>
    <rect x="242" y="228" width="190" height="52" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="337" y="248" text-anchor="middle" font-weight="600">Policy Engine</text>
    <text x="337" y="264" text-anchor="middle" fill="#047857">budgets · circuit breakers</text>
    <rect x="444" y="228" width="200" height="52" rx="6" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="544" y="248" text-anchor="middle" font-weight="600">Trust Plane</text>
    <text x="544" y="264" text-anchor="middle" fill="#047857">signed identities · provenance chain</text>
  </g>

  <!-- Intelligence layer -->
  <rect x="24" y="324" width="640" height="102" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="40" y="348" font-size="13" font-weight="700" fill="#9a3412">Intelligence Layer — LLM inside steps, never in control of the lifecycle</text>
  <g font-size="11" fill="#7c2d12">
    <rect x="40" y="360" width="142" height="52" rx="6" fill="#ffffff" stroke="#fed7aa"/>
    <text x="111" y="380" text-anchor="middle" font-weight="600">Planner / Supervisor</text>
    <text x="111" y="396" text-anchor="middle" fill="#b45309">delegation contracts</text>
    <rect x="192" y="360" width="142" height="52" rx="6" fill="#ffffff" stroke="#fed7aa"/>
    <text x="263" y="380" text-anchor="middle" font-weight="600">Model Router</text>
    <text x="263" y="396" text-anchor="middle" fill="#b45309">cheapest tier · escalate</text>
    <rect x="344" y="360" width="142" height="52" rx="6" fill="#ffffff" stroke="#fed7aa"/>
    <text x="415" y="380" text-anchor="middle" font-weight="600">Verifier Registry</text>
    <text x="415" y="396" text-anchor="middle" fill="#b45309">exec &gt; scorer &gt; judge</text>
    <rect x="496" y="360" width="148" height="52" rx="6" fill="#ffffff" stroke="#fed7aa"/>
    <text x="570" y="380" text-anchor="middle" font-weight="600">Learning Subsystem</text>
    <text x="570" y="396" text-anchor="middle" fill="#b45309">playbook · failure triage</text>
  </g>

  <!-- Runner layer -->
  <rect x="24" y="456" width="640" height="102" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="40" y="480" font-size="13" font-weight="700" fill="#334155">Runner Layer — workers behind one adapter contract</text>
  <g font-size="11" fill="#334155">
    <rect x="40" y="492" width="142" height="52" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="111" y="512" text-anchor="middle" font-weight="600">Claude Code adapter</text>
    <text x="111" y="528" text-anchor="middle" fill="#64748b">headless CLI</text>
    <rect x="192" y="492" width="142" height="52" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="263" y="512" text-anchor="middle" font-weight="600">Codex CLI adapter</text>
    <text x="263" y="528" text-anchor="middle" fill="#64748b">headless CLI</text>
    <rect x="344" y="492" width="142" height="52" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="415" y="512" text-anchor="middle" font-weight="600">SDK / local workers</text>
    <text x="415" y="528" text-anchor="middle" fill="#64748b">OpenAI-compat</text>
    <rect x="496" y="492" width="148" height="52" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="570" y="512" text-anchor="middle" font-weight="600">Enrichment wrapper</text>
    <text x="570" y="528" text-anchor="middle" fill="#64748b">tool-offload · voting</text>
  </g>

  <!-- Right column: Eval, OTel, selflearn -->
  <rect x="692" y="76" width="264" height="130" rx="10" fill="#fdf4ff" stroke="#f0abfc"/>
  <text x="708" y="100" font-size="13" font-weight="700" fill="#86198f">Eval Subsystem</text>
  <g font-size="11" fill="#701a75">
    <text x="708" y="122">golden sets · pass^k gating</text>
    <text x="708" y="140">capability matrix per task type</text>
    <text x="708" y="158">model-swap go/no-go reports</text>
    <text x="708" y="176">third-party judge · holdouts</text>
  </g>

  <rect x="692" y="236" width="264" height="88" rx="10" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="708" y="260" font-size="13" font-weight="700" fill="#075985">Observability</text>
  <g font-size="11" fill="#0c4a6e">
    <text x="708" y="282">OpenTelemetry spans everywhere</text>
    <text x="708" y="300">model · tier · cost · verdict · MAST</text>
  </g>

  <rect x="692" y="354" width="264" height="204" rx="10" fill="#fefce8" stroke="#fde047"/>
  <text x="708" y="378" font-size="13" font-weight="700" fill="#854d0e">selflearn — knowledge system</text>
  <g font-size="11" fill="#713f12">
    <text x="708" y="400">acquire → verify → gate → publish</text>
    <text x="708" y="418">retrieval → fenced, cited injection</text>
    <text x="708" y="436">marks · gaps · learner suggestions</text>
    <text x="708" y="458" font-weight="600">host-agnostic via five ports:</text>
    <text x="708" y="476">Model · Embedding · Execution</text>
    <text x="708" y="494">Provenance · Identity</text>
    <text x="708" y="516" fill="#a16207">plain files: Markdown + YAML,</text>
    <text x="708" y="532" fill="#a16207">JSON manifests, JSONL provenance</text>
  </g>

  <!-- Arrows -->
  <g stroke="#475569" stroke-width="1.6" fill="none">
    <line x1="344" y1="162" x2="344" y2="190" marker-end="url(#arr)"/>
    <line x1="470" y1="490" x2="470" y2="428" marker-end="url(#arr)"/>
    <line x1="344" y1="296" x2="344" y2="322" marker-end="url(#arr)"/>
    <line x1="180" y1="386" x2="190" y2="386" marker-end="url(#arr)"/>
    <line x1="334" y1="386" x2="344" y2="386" marker-end="url(#arr)"/>
    <line x1="486" y1="386" x2="496" y2="386" marker-end="url(#arr)"/>
  </g>
  <g font-size="10" fill="#475569">
    <text x="352" y="180">launch · approve · steer</text>
    <text x="352" y="314">dispatch tasks</text>
    <text x="477" y="452">verify results</text>
  </g>
  <g stroke="#94a3b8" stroke-width="1.4" fill="none" stroke-dasharray="5 4">
    <line x1="664" y1="392" x2="692" y2="392" marker-start="url(#arrd)"/>
    <line x1="664" y1="240" x2="692" y2="276" marker-end="url(#arrd)"/>
    <line x1="820" y1="206" x2="820" y2="236" marker-end="url(#arrd)"/>
  </g>
  <g font-size="10" fill="#94a3b8">
    <text x="612" y="430">knowledge</text>
    <text x="612" y="444">injection</text>
    <text x="826" y="226">spans</text>
  </g>
</svg>
